<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" type="text/css" href="{{ "/assets/css/style.css" | relative_url }}">
    <link rel="stylesheet" type="text/css" href="{{ "/assets/css/ft-syntax-highlight.css" | relative_url }}">
</head>
<body>
<nav>
    <a href="{{ page.prev }}">&lt; {{ page.prev }}</a>
    <span class="title">{{ page.title }}</span>
    <a href="/">index.html</a>
</nav>
<main>
    <p>
        Date: {{ page.date | date: '%A, %m/%d/%Y'}}<br>
        Tags:     
        {% for tag in page.tags %}
        <a href="{{site.baseurl}}/archive.html#{{tag | slugize}}">#{{ tag }}</a>
        {% endfor %}
    </p>
    <hr>

    <h1>{{ page.title }}</h1>
    {{ content }}
    {% include footer.html %}
</main>
</body>
</html>
