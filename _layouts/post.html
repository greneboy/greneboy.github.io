<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" type="text/css" href="{{ "/assets/css/style.css" | relative_url }}">
</head>
<body>
<nav>
    <a href="{{ page.prev }}">&lt; {{ page.prev }}</a>
    <span class="title">{{ page.title }}</span>
    <u><span>greneboy(7)</span></u>
</nav>
<main>
    <p>
        Date: {{ page.date }}<br>
        Tags:     
        {% for tag in page.tags %}
        <a href="{{site.baseurl}}/archive.html#{{tag | slugize}}">#{{ tag }}</a>
        {% endfor %}
    </p>
    <hr>
    <h1>{{ page.title }}</h1>

    {{ content }}
    <hr>
    <h3>COPYRIGHT</h3>
    &copy; 2025 greneboy
</main>
</body>
</html>
